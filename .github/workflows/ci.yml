name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install
        run: vp install

      - name: Check
        run: pnpm check

      - name: Test
        run: vp run test -r

      - name: Build
        run: vp run build -r

      - name: Verify Client Entrypoints
        run: pnpm verify:client-entrypoints
