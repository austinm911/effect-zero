name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install
        run: vp install

      - name: Wait for Postgres
        run: |
          for _ in {1..30}; do
            if bash -lc ':</dev/tcp/127.0.0.1/5438' 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Build
        run: vp run build -r

      - name: Check
        run: pnpm check

      - name: Test
        run: vp run test -r

      - name: Verify Client Entrypoints
        run: pnpm verify:client-entrypoints
